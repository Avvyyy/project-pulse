
# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_SSLMODE: require
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-prod
    image: project-pulse-backend:latest
    restart: always
    volumes: []
    environment:
      APP_ENV: production

  elasticsearch:
    environment:
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true

  caddy:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend

volumes:
  caddy_data:
  postgres_data:
